name: student-performance-app

on:
      push:
            branches:
                  - master

env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI }}


jobs:
      test:
            runs-on: ubuntu-24.04
            steps:
                  - uses: actions/checkout@v4
                  
                  - name: Building Docker image
                    run: docker build -t student-performance .

                  - name: Docker image test
                    run: docker run --rm student-performance pytest tests/
      
      deploy:
            runs-on: ubuntu-24.04
            needs: test
            if: github.ref == 'refs/heads/master'

            steps:
                  - uses: actions/checkout@v4

                  - name: AWS Configuration
                    uses: aws-actions/configure-aws-credentials@v4
                    with:
                        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID}} 
                        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                        aws-region: ${{ secrets.AWS_REGION }}
                  
                  - name: ECR login
                    uses: aws-actions/amazon-ecr-login@v2

                  - name: Build and Push Docker image
                    run: |
                        docker build -t ${{ secrets.ECR_REPOSITORY_URI }}:latest .
                        docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest

                  - name: Zip deployment files
                    run: |
                      zip -r deployment.zip appspec.yml scripts/

                  - name: Upload to S3
                    run: |
                      aws s3 cp deployment.zip s3://codedeploy-student-app-bucket/deployment.zip

                  - name: Trigger CodeDeploy
                    run: |
                      aws deploy create-deployment \
                        --application-name devops-learning-app \
                        --deployment-group-name production-group \
                        --s3-location bucket=codedeploy-student-app-bucket,key=deployment.zip,bundleType=zip \
                        --region us-east-2
